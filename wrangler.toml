name = "edcloudwasm"
main = "_worker.js"  # 你的 JS 逻辑代码
compatibility_date = "2026-03-02"

# pages中环境变量需要手动填写并重试部署才会生效
# --- worker环境变量配置 ---
[vars]

# 付费worker 可设置cpu时间限制
#[limits]
#cpu_ms = 300000

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true
